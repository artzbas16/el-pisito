<section class="contenedor">
    <h1>Registro de Usuario</h1>
    <section class="contenedor-formulario">
        <form #form="ngForm" (ngSubmit)="register()" [formGroup]="registerForm">
            <div class="mb-3">
                <label for="usuario">USUARIO*</label> 
                <input type="text" id="usuario" class="form-control" name="usuario" autocomplete="off" [class.is-invalid]="registerForm.get('elUsuario')?.invalid && registerForm.get('elUsuario')?.touched" formControlName="elUsuario">
            </div>
            <div class="mb-3">
                <label for="password">PASSWORD*</label> 
                <input type="password" id="password" class="form-control" name="password" autocomplete="off" [class.is-invalid]="registerForm.get('elPassword')?.invalid && registerForm.get('elPassword')?.touched" formControlName="elPassword">
            </div>
            <div class="mb-3">
                <label for="email">EMAIL*</label> 
                <input type="email" id="email" class="form-control" name="email" autocomplete="off" [class.is-invalid]="registerForm.get('elEmail')?.invalid && registerForm.get('elEmail')?.touched" formControlName="elEmail">
            </div>
            <div class="contenedor-boton">
                <button type="submit" class="btn btn-md btn-primary" [disabled]="registerForm.invalid">Registrar</button>
            </div>
        </form>
    </section>
</section>
